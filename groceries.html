<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Groceries – QuickGo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f7fb;
}

/* HEADER */
.header {
  background: #22c55e;
  color: white;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cart {
  position: relative;
  cursor: pointer;
  font-size: 30px;
}

.cart span {
  position: absolute;
  top: -8px;
  right: -10px;
  background: red;
  color: white;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 50%;
}

/* SEARCH */
.search-box {
  padding: 12px 16px;
}

.search-box input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 16px;
}

/* CATEGORIES */
.category-row {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  overflow-x: auto;
}

.category {
  background: #fff;
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
}

.category.active {
  background: #22c55e;
  color: white;
  font-weight: bold;
}

/* GRID */
.grid {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 8px 18px rgba(0,0,0,.08);
}

.card img {
  width: 100%;
  height: 130px;
  object-fit: cover;
  border-radius: 10px;
}

.price {
  color: #16a34a;
  font-weight: bold;
}

/* QTY */
.qty {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.qty button {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 6px;
  background: #22c55e;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.add-btn {
  width: 100%;
  padding: 8px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.home-btn {
  font-size: 26px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="home-btn" onclick="location.href='index.html'">🏠</div>
  <h2>🧺 Groceries</h2>
  <div class="cart" onclick="location.href='grocery-checkout.html'">
    🛒 <span id="cartCount">0</span>
  </div>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput"
         placeholder="Search groceries..."
         oninput="searchItems(this.value)">
</div>

<!-- CATEGORIES -->
<div class="category-row">
  <div class="category active" onclick="filterCategory('vegetables', this)">🥦 Vegetables</div>
  <div class="category" onclick="filterCategory('fruits', this)">🍎 Fruits</div>
  <div class="category" onclick="filterCategory('dairy', this)">🥛 Dairy</div>
  <div class="category" onclick="filterCategory('snacks', this)">🍪 Snacks</div>
</div>

<!-- GRID -->
<div class="grid" id="groceryGrid"></div>

<script>
/* DATA */
const groceries = [
  { name: "Tomato (1kg)", price: 40, cat: "vegetables",
    img: "https://images.unsplash.com/photo-1582284540020-8acbe03f4924?auto=format&fit=crop&w=600&q=80" },
  { name: "Onion (1kg)", price: 35, cat: "vegetables",
    img: "https://images.unsplash.com/photo-1618512496248-a07fe83aa8cb" },
  { name: "Apple (1kg)", price: 120, cat: "fruits",
    img: "https://images.unsplash.com/photo-1567306226416-28f0efdc88ce" },
  { name: "Milk (1L)", price: 60, cat: "dairy",
    img: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b" },
  { name: "Bread", price: 45, cat: "snacks",
    img: "https://images.unsplash.com/photo-1608198093002-ad4e005484ec" }
];

let currentCategory = "vegetables";
let filteredItems = [];

/* CART (✅ FIXED KEY ONLY) */
function getCart() {
  return JSON.parse(localStorage.getItem("groceryCart")) || [];
}

function saveCart(cart) {
  localStorage.setItem("groceryCart", JSON.stringify(cart));
  updateCartCount();
}

/* RENDER */
function render(items) {
  const cart = getCart();
  const grid = document.getElementById("groceryGrid");
  grid.innerHTML = "";

  if (items.length === 0) {
    grid.innerHTML = `<p>No items found</p>`;
    return;
  }

  items.forEach(item => {
    const cartItem = cart.find(c => c.name === item.name);
    const qty = cartItem ? cartItem.qty : 0;

    grid.innerHTML += `
      <div class="card">
        <img src="${item.img}">
        <h4>${item.name}</h4>
        <div class="price">₹${item.price}</div>

        ${
          qty === 0
          ? `<button class="add-btn"
               onclick="changeQty('${item.name}',${item.price},1)">
               Add
             </button>`
          : `<div class="qty">
               <button onclick="changeQty('${item.name}',${item.price},-1)">−</button>
               <span>${qty}</span>
               <button onclick="changeQty('${item.name}',${item.price},1)">+</button>
             </div>`
        }
      </div>
    `;
  });
}

/* SEARCH */
function searchItems(text) {
  const value = text.toLowerCase();
  const result = filteredItems.filter(i =>
    i.name.toLowerCase().includes(value)
  );
  render(result);
}

/* CATEGORY */
function filterCategory(cat, el) {
  document.querySelectorAll(".category")
    .forEach(c => c.classList.remove("active"));
  el.classList.add("active");

  currentCategory = cat;
  filteredItems = groceries.filter(g => g.cat === cat);
  document.getElementById("searchInput").value = "";
  render(filteredItems);
}

/* QTY */
function changeQty(name, price, delta) {
  let cart = getCart();
  let item = cart.find(i => i.name === name);

  if (!item && delta > 0) {
    cart.push({ name, price, qty: 1 });
  } else if (item) {
    item.qty += delta;
    if (item.qty <= 0) {
      cart = cart.filter(i => i.name !== name);
    }
  }

  saveCart(cart);
  render(filteredItems);
}

/* CART COUNT */
function updateCartCount() {
  let count = 0;
  getCart().forEach(i => count += i.qty);
  document.getElementById("cartCount").innerText = count;
}

/* INIT */
filteredItems = groceries.filter(g => g.cat === currentCategory);
render(filteredItems);
updateCartCount();
</script>

</body>
</html>
